<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Debug Example</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <button id="playBtn">▶ Play</button>

  <div id="debugText">Example will appear here</div>

  <div class="sliderGroup">
    <label for="volumeSlider">Volume</label>
    <input
      id="volumeSlider"
      type="range"
      min="0"
      max="1"
      step="0.01"
      value="1"
    >
  </div>

</div>

</body>
<script type="module" src="script.js"></script>
</html>
